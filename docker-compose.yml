version: '3.8'

services:
  sistac:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: listac-tfe-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - sistac-data:/app/data
      - sistac-paper:/app/paper
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: sistac-mongodb
    ports:
      - "27017:27017"
    volumes:
      - sistac-mongo-db:/data/db
    restart: unless-stopped

volumes:
  sistac-data:
  sistac-paper:
  sistac-mongo-db:
