version: '3.8'

services:
  sistac:
    build:
      context: .
      dockerfile: Dockerfile
    image: sistac-tfe-app:latest
    container_name: sistac-tfe-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: sistac-mongodb
    ports:
      - "27017:27017"
    volumes:
      - sistac-mongo-db:/data/db
    tmpfs:
      - /data/configdb
    restart: unless-stopped

volumes:
  sistac-mongo-db:
    name: clo-author_sistac-mongo-db
    external: true




