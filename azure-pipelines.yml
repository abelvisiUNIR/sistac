# ============================================================================
# SISTAC — Azure DevOps CI/CD Pipeline
# ============================================================================
# Stages:
#   1. validate      — imports + tests PII (siempre)
#   2. build_app     — Docker build + push a Azure Container Registry
#   3. deploy        — deploy a Azure Container Instance (solo rama main)
#
# Variables requeridas en Library → Variable Group "sistac-secrets":
#   ANTHROPIC_API_KEY        (secret)
#   AZURE_SEARCH_ENDPOINT
#   AZURE_SEARCH_KEY         (secret)
#   AZURE_SEARCH_INDEX       = sistac-cvs
#   ACR_NAME                 = sistacregistry  (Azure Container Registry)
#   ACR_LOGIN_SERVER         = sistacregistry.azurecr.io
#   ACR_USERNAME             (secret — desde ACR → Access keys)
#   ACR_PASSWORD             (secret — desde ACR → Access keys)
#   RESOURCE_GROUP           = rg-sistac
#   ACI_NAME                 = sistac-app  (Azure Container Instance name)
# ============================================================================

trigger:
  branches:
    include:
      - desarrollo
      - main
  paths:
    include:
      - scripts/python/**
      - app/**
      - Dockerfile
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.11"
  SCRIPTS_DIR: "scripts/python"
  IMAGE_NAME: "sistac-app"
  IMAGE_TAG: "$(Build.BuildId)"

# ── Stage 1: Validación ───────────────────────────────────────────────────────
stages:
  - stage: validate
    displayName: "1. Validar código (imports + tests PII)"
    jobs:
      - job: lint_and_test
        displayName: "Lint + pytest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(PYTHON_VERSION)
            displayName: "Setup Python $(PYTHON_VERSION)"

          - script: |
              pip install -r $(SCRIPTS_DIR)/requirements.txt
              pip install fastapi uvicorn python-multipart
            displayName: "Instalar dependencias"

          - script: python -m spacy download es_core_news_lg
            displayName: "Modelo spaCy español"

          - script: |
              cd $(SCRIPTS_DIR)
              python -c "from config import SCORE_THRESHOLD; assert SCORE_THRESHOLD == 70; print('OK SCORE_THRESHOLD=70')"
              python -c "from rag.pipeline import SistacRAGPipeline; print('OK SistacRAGPipeline')"
              python -c "from scoring.scorer import score_candidate; print('OK score_candidate')"
              python -c "from pii.anonymizer import SistacAnonymizer; print('OK SistacAnonymizer')"
            displayName: "Verificar imports críticos"
            env:
              ANTHROPIC_API_KEY: "dummy_for_import_check"
              AZURE_SEARCH_ENDPOINT: "https://test.search.windows.net"
              AZURE_SEARCH_KEY: "dummy"

          - script: |
              cd $(SCRIPTS_DIR)
              python -m pytest pii/test_anonymization.py -v --tb=short \
                --junitxml=test-results.xml
            displayName: "Tests PII (10 tests)"

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "$(SCRIPTS_DIR)/test-results.xml"
            displayName: "Publicar resultados de tests"
            continueOnError: true

