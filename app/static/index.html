  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     background:\n        radial-gradient(1100px 600px at 85% -10%, rgba(34,211,238,.10), transparent 60%),\n        radial-gradient(900px 500px at -5% 20%, rgba(167,139,250,.08), transparent 60%),\n        linear-gradient(180deg, #05070d 0%, #070a14 100%);\n      background-attachment: fixed;\n    }\n    .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }\n\n    /* Background grid */\n    .grid-bg::before{\n      content:\"\"; position:fixed; inset:0; pointer-events:none; z-index:0;\n      background-image:\n        linear-gradient(rgba(120,180,255,.045) 1px, transparent 1px),\n        linear-gradient(90deg, rgba(120,180,255,.045) 1px, transparent 1px);\n      background-size: 56px 56px;\n      mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%);\n    }\n    .grid-bg::after{\n      content:\"\"; position:fixed; inset:0; pointer-events:none; z-index:0;\n      background:\n        repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);\n    }\n    main, header, .tabs-bar { position:relative; z-index:1; }\n\n    /* Cards / panels */\n    .panel{\n      background:linear-gradient(180deg, rgba(14,20,36,.78), rgba(10,14,26,.78));\n      border:1px solid var(--line);\n      border-radius:18px;\n      backdrop-filter: blur(14px);\n      -webkit-backdrop-filter: blur(14px);\n      box-shadow:\n        0 1px 0 rgba(255,255,255,.04) inset,\n        0 30px 80px -40px rgba(0,0,0,.8);\n    }\n    .panel-lite{\n      background:rgba(14,20,36,.55);\n      border:1px solid var(--line);\n      border-radius:14px;\n      backdrop-filter: blur(10px);\n    }\n    .corner{ position:relative; }\n    .corner::before,.corner::after{\n      content:\"\"; position:absolute; width:14px; height:14px;\n      border:1px solid var(--cyan); opacity:.55;\n    }\n    .corner::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; border-top-left-radius:18px; }\n    .corner::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; border-bottom-right-radius:18px; }\n\n    /* Inputs */\n    .label{ display:block; font-size:.7rem; font-weight:500; color:var(--ink-dim); margin-bottom:.45rem;\n      text-transform:uppercase; letter-spacing:.12em; }\n    .field{\n      width:100%; background:rgba(5,7,13,.6);\n      border:1px solid var(--line-2); color:var(--ink);\n      border-radius:.75rem; padding:.7rem .85rem; font-size:.9rem; outline:none;\n      transition:all .15s; font-family:inherit;\n    }\n    .field:focus{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(34,211,238,.18), 0 0 18px var(--cyan-glow) inset; }\n    select.field{ appearance:none; background-image:\n      linear-gradient(45deg, transparent 50%, var(--ink-dim) 50%),\n      linear-gradient(135deg, var(--ink-dim) 50%, transparent 50%);\n      background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;\n      background-size:5px 5px, 5px 5px; background-repeat:no-repeat;\n    }\n    input[type=file]{ display:none; }\n\n    /* Header */\n    .header{\n      background:linear-gradient(180deg, rgba(8,11,20,.85), rgba(8,11,20,.6));\n      border-bottom:1px solid var(--line);\n      backdrop-filter: blur(16px);\n    }\n    .logo{\n      width:36px;height:36px;border-radius:10px;\n      background:\n        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 50%),\n        linear-gradient(135deg, #22d3ee 0%, #6366f1 60%, #a78bfa 100%);\n      display:flex;align-items:center;justify-content:center;\n      box-shadow: 0 0 24px rgba(34,211,238,.35), 0 0 0 1px rgba(34,211,238,.5) inset;\n      position:relative; overflow:hidden;\n    }\n    .logo::after{\n      content:\"\"; position:absolute; inset:0;\n      background:repeating-linear-gradient(0deg, rgba(255,255,255,.12) 0 1px, transparent 1px 4px);\n      mix-blend-mode:overlay;\n    }\n    .logo svg{ filter: drop-shadow(0 0 6px rgba(255,255,255,.6)); }\n\n    /* Status pill */\n    .status-pill{ font-family:'JetBrains Mono'; font-size:.68rem; letter-spacing:.05em;\n      padding:.32rem .65rem; border-radius:999px; border:1px solid var(--line-2);\n      background:rgba(8,11,20,.6); color:var(--ink-dim); display:inline-flex; align-items:center; gap:.4rem; }\n    .status-pill.online{ color:var(--emerald); border-color:rgba(52,211,153,.35); box-shadow:0 0 14px rgba(52,211,153,.15) inset; }\n    .status-pill.offline{ color:var(--red); border-color:rgba(251,113,133,.35); }\n    .status-pill .led{ width:6px;height:6px;border-radius:50%; background:currentColor;\n      box-shadow:0 0 10px currentColor; animation: pulseLed 1.8s infinite; }\n    @keyframes pulseLed { 0%,100%{ opacity:1 } 50%{ opacity:.4 } }\n\n    /* Tabs */\n    .tabs-bar{\n      background:rgba(8,11,20,.55);\n      border-bottom:1px solid var(--line);\n      backdrop-filter: blur(12px);\n    }\n    .tab-btn{\n      padding:.95rem 1.1rem; font-size:.78rem; color:var(--ink-dim);\n      border-bottom:2px solid transparent; white-space:nowrap;\n      text-transform:uppercase; letter-spacing:.14em; font-weight:500;\n      transition:all .15s; position:relative;\n    }\n    .tab-btn:hover{ color:var(--ink); }\n    .active-tab{\n      color:#fff !important; font-weight:600;\n      border-bottom-color:var(--cyan) !important;\n    }\n    .active-tab::before{\n      content:\"\"; position:absolute; left:0; right:0; bottom:-2px; height:2px;\n      background:var(--cyan); box-shadow:0 0 14px var(--cyan-glow); border-radius:2px;\n    }\n\n    /* Pipeline radios */\n    .pipe{\n      background:rgba(5,7,13,.5); border:1px solid var(--line-2);\n      border-radius:.8rem; padding:.65rem .5rem; text-align:center;\n      transition:all .18s; cursor:pointer;\n    }\n    .pipe-label{ font-family:'JetBrains Mono'; font-size:.78rem; font-weight:600; color:var(--ink-dim); letter-spacing:.06em; }\n    .pipe-sub{ font-size:.65rem; color:var(--ink-faint); margin-top:.1rem; text-transform:uppercase; letter-spacing:.08em;}\n    .peer:checked + .pipe{\n      border-color:var(--cyan);\n      background:linear-gradient(180deg, rgba(34,211,238,.12), rgba(34,211,238,.04));\n      box-shadow: 0 0 0 1px var(--cyan) inset, 0 0 22px rgba(34,211,238,.2);\n    }\n    .peer:checked + .pipe .pipe-label{ color:#fff; }\n    .peer:checked + .pipe .pipe-sub{ color:var(--cyan); }\n\n    /* Dropzone */\n    .drop-zone{\n      transition:all .2s;\n      background:\n        linear-gradient(rgba(34,211,238,.04), rgba(34,211,238,.04)),\n        repeating-linear-gradient(135deg, rgba(120,180,255,.04) 0 8px, transparent 8px 16px);\n      border:1.5px dashed rgba(120,180,255,.28); border-radius:14px;\n    }\n    .drop-zone:hover{ border-color:var(--cyan); background:rgba(34,211,238,.06); }\n    .drop-zone.over{ border-color:var(--cyan); background:rgba(34,211,238,.10);\n      box-shadow:0 0 0 3px rgba(34,211,238,.12), 0 0 30px rgba(34,211,238,.25) inset; }\n\n    /* Primary button */\n    .btn-primary{\n      position:relative; overflow:hidden;\n      background:linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);\n      color:#fff; font-weight:600; letter-spacing:.08em; text-transform:uppercase; font-size:.78rem;\n      border-radius:12px; padding:.95rem 1rem;\n      box-shadow: 0 0 24px rgba(34,211,238,.25), 0 0 0 1px rgba(34,211,238,.4) inset;\n      transition:all .18s;\n    }\n    .btn-primary:hover:not(:disabled){\n      box-shadow: 0 0 38px rgba(34,211,238,.45), 0 0 0 1px rgba(34,211,238,.6) inset;\n      transform: translateY(-1px);\n    }\n    .btn-primary:disabled{ opacity:.4; cursor:not-allowed; background:#1f2937; box-shadow:none; }\n    .btn-primary::after{\n      content:\"\"; position:absolute; top:0; left:-60%; width:40%; height:100%;\n      background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);\n      transform:skewX(-20deg); animation: sheen 3.5s infinite;\n    }\n    @keyframes sheen { 0%{ left:-60% } 60%,100%{ left:120% } }\n\n    /* Loader / dots */\n    .dot{ animation: blink 1.2s infinite; box-shadow:0 0 12px var(--cyan-glow); }\n    .dot:nth-child(2){ animation-delay:.2s }\n    .dot:nth-child(3){ animation-delay:.4s }\n    @keyframes blink{ 0%,80%,100%{ transform:scale(1); opacity:.35 } 40%{ transform:scale(1.4); opacity:1 } }\n\n    /* Progress shimmer */\n    .progress-track{\n      height:3px; background:rgba(120,180,255,.12); border-radius:999px; overflow:hidden;\n      border:1px solid var(--line);\n    }\n    .progress-shimmer{\n      height:100%; width:40%;\n      background:linear-gradient(90deg, transparent, var(--cyan), transparent);\n      animation: prog 1.4s infinite linear;\n      box-shadow:0 0 14px var(--cyan-glow);\n    }\n    @keyframes prog{ 0%{ transform:translateX(-100%) } 100%{ transform:translateX(350%) } }\n\n    /* Score pill */\n    .score-pill{\n      width:3rem; height:3rem; border-radius:14px;\n      display:flex; align-items:center; justify-content:center;\n      font-family:'JetBrains Mono'; font-weight:700; font-size:.95rem;\n      flex-shrink:0; position:relative;\n    }\n    .score-pill::before{\n      content:\"\"; position:absolute; inset:-1px; border-radius:inherit;\n      background:linear-gradient(135deg, currentColor, transparent 60%);\n      opacity:.25; z-index:-1;\n    }\n\n    /* Ranking row */\n    .rank-row{ transition: background .15s, transform .15s; }\n    .rank-row:hover{ background:rgba(34,211,238,.05); }\n\n    /* Stat tiles */\n    .stat-tile{\n      border-radius:14px; padding:1rem; text-align:left; position:relative; overflow:hidden;\n      border:1px solid var(--line); background:rgba(5,7,13,.5);\n    }\n    .stat-tile::after{\n      content:\"\"; position:absolute; inset:auto -30% -50% auto; width:120px; height:120px; border-radius:50%;\n      opacity:.18; filter:blur(20px);\n    }\n    .stat-tile.apt::after{ background:var(--emerald) }\n    .stat-tile.no::after{ background:var(--red) }\n    .stat-tile.tot::after{ background:var(--cyan) }\n    .stat-tile .num{ font-family:'JetBrains Mono'; font-size:1.9rem; font-weight:700; line-height:1; letter-spacing:-.02em; }\n    .stat-tile .lbl{ font-size:.66rem; letter-spacing:.18em; text-transform:uppercase; margin-top:.45rem; color:var(--ink-dim); }\n\n    /* Badges */\n    .badge{ display:inline-block; font-size:.66rem; font-weight:600; padding:.25rem .6rem;\n      border-radius:6px; letter-spacing:.1em; text-transform:uppercase; font-family:'JetBrains Mono'; }\n    .badge.apt{ background:rgba(52,211,153,.12); color:var(--emerald); border:1px solid rgba(52,211,153,.3) }\n    .badge.no{ background:rgba(251,113,133,.10); color:var(--red); border:1px solid rgba(251,113,133,.3) }\n    .badge.err{ background:rgba(120,180,255,.06); color:var(--ink-dim); border:1px solid var(--line-2) }\n\n    /* CV queue item */\n    .cv-item{\n      background:rgba(5,7,13,.55); border:1px solid var(--line-2);\n      border-radius:10px; padding:.5rem .7rem;\n    }\n\n    /* Fade-in / slide-in */\n    .fade-in{ animation: fi .3s ease; }\n    @keyframes fi{ from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:none } }\n    .cv-item-enter{ animation: slideIn .2s ease; }\n    @keyframes slideIn{ from{ opacity:0; transform:translateX(-8px) } to{ opacity:1; transform:none } }\n\n    /* Bar (dimension) */\n    .bar{ transition: width .7s cubic-bezier(.4,0,.2,1); position:relative; }\n    .bar::after{\n      content:\"\"; position:absolute; top:0; left:0; height:100%; width:100%;\n      background:linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);\n      animation: barShine 2.4s infinite; opacity:.7;\n    }\n    @keyframes barShine{ 0%{ transform:translateX(-100%) } 100%{ transform:translateX(100%) } }\n\n    /* Section header line */\n    .section-title{ display:flex; align-items:center; gap:.7rem; }\n    .section-title .line{ flex:1; height:1px;\n      background:linear-gradient(90deg, var(--line-2), transparent); }\n\n    /* Scrollbar */\n    ::-webkit-scrollbar{ width:8px; height:8px; }\n    ::-webkit-scrollbar-track{ background:transparent; }\n    ::-webkit-scrollbar-thumb{ background:rgba(120,180,255,.15); border-radius:4px; }\n    ::-webkit-scrollbar-thumb:hover{ background:rgba(34,211,238,.35); }\n\n    /* Caret */\n    .caret::after{\n      content:\"_\"; color:var(--cyan); margin-left:2px;\n      animation: caret 1s steps(1) infinite;\n    }\n    @keyframes caret{ 50%{ opacity:0 } }\n\n    /* Subtle scanline overlay */\n    .scan{ position:fixed; inset:0; pointer-events:none; z-index:2; opacity:.4;\n      background:repeating-linear-gradient(0deg, rgba(255,255,255,.02) 0 1px, transparent 1px 3px); }\n\n    /* Tab content full-width fix */\n    .content-wrap{ max-width: 1200px; }\n  <\u002Fstyle>\n\n<\u002Fhead>\n<body class=\"grid-bg min-h-screen\">\n<div class=\"scan\"><\u002Fdiv>\n\n<!-- Header -->\n<header class=\"header sticky top-0 z-50\">\n  <div class=\"content-wrap mx-auto px-6 h-16 flex items-center justify-between\">\n    <div class=\"flex items-center gap-3\">\n      <div class=\"logo\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M4 6l8-4 8 4-8 4z\"><\u002Fpath>\n          <path d=\"M4 12l8 4 8-4\"><\u002Fpath>\n          <path d=\"M4 18l8 4 8-4\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-3\">\n        <span class=\"font-semibold tracking-wide text-white text-[15px]\">SISTAC<\u002Fspan>\n        <span class=\"mono text-[10px] text-cyan-400/70 border border-cyan-400/20 px-1.5 py-0.5 rounded\">v2.4 · RAG<\u002Fspan>\n        <span class=\"hidden md:block text-xs text-slate-500 mono tracking-wider\">/ SELECCIÓN INTELIGENTE DE TALENTO<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flex items-center gap-3\">\n      <span class=\"hidden md:inline status-pill mono\">\n        <span class=\"led\" style=\"background:var(--ink-faint)\"><\u002Fspan>\n        <span id=\"hclock\">--:--:--<\u002Fspan>\n      <\u002Fspan>\n      <span id=\"hbadge\" class=\"status-pill\">\n        <span class=\"led\" style=\"background:var(--ink-faint)\"><\u002Fspan>\n        <span>CONECTANDO<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- Tabs -->\n<div class=\"tabs-bar\">\n  <div class=\"content-wrap mx-auto px-6 flex\">\n    <button id=\"tb-evaluar\" onclick=\"tab('evaluar')\" class=\"tab-btn active-tab\">› Evaluar candidatos<\u002Fbutton>\n    <button id=\"tb-cargos\" onclick=\"tab('cargos')\" class=\"tab-btn\">› Gestionar cargos<\u002Fbutton>\n    <button id=\"tb-historial\" onclick=\"tab('historial')\" class=\"tab-btn\">› Historial<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<main class=\"content-wrap mx-auto px-6 py-8\">\n\n  <!-- ═══ TAB EVALUAR ═══════════════════════════════════════════════════════ -->\n  <div id=\"p-evaluar\" class=\"fade-in\">\n    <div class=\"grid lg:grid-cols-5 gap-7\">\n\n      <!-- Columna izquierda: formulario (2/5) -->\n      <div class=\"lg:col-span-2 space-y-6\">\n        <div class=\"panel corner p-5 space-y-5\">\n          <div>\n            <div class=\"section-title mb-1\">\n              <span class=\"mono text-[10px] text-cyan-400 tracking-[.25em]\">›› INPUT<\u002Fspan>\n              <div class=\"line\"><\u002Fdiv>\n            <\u002Fdiv>\n            <h2 class=\"text-xl font-bold text-white tracking-tight\">Evaluar candidatos<\u002Fh2>\n            <p class=\"text-xs text-slate-500 mt-1\">Seleccioná el cargo y subí uno o varios CVs para análisis.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- Cargo -->\n          <div>\n            <label class=\"label\">// Cargo objetivo<\u002Flabel>\n            <select id=\"sel-cargo\" class=\"field\">\n              <option value=\"\">Cargando cargos…<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <!-- Pipeline -->\n          <div>\n            <label class=\"label\">// Pipeline<\u002Flabel>\n            <div class=\"grid grid-cols-3 gap-2\">\n              <label class=\"cursor-pointer block\"><input type=\"radio\" name=\"cfg\" value=\"c1\" class=\"sr-only peer\">\n                <div class=\"pipe\">\n                  <p class=\"pipe-label\">C1<\u002Fp><p class=\"pipe-sub\">LLM puro<\u002Fp>\n                <\u002Fdiv><\u002Flabel>\n              <label class=\"cursor-pointer block\"><input type=\"radio\" name=\"cfg\" value=\"c2\" checked=\"\" class=\"sr-only peer\">\n                <div class=\"pipe\">\n                  <p class=\"pipe-label\">C2<\u002Fp><p class=\"pipe-sub\">RAG<\u002Fp>\n                <\u002Fdiv><\u002Flabel>\n              <label class=\"cursor-pointer block\"><input type=\"radio\" name=\"cfg\" value=\"c3\" class=\"sr-only peer\">\n                <div class=\"pipe\">\n                  <p class=\"pipe-label\">C3<\u002Fp><p class=\"pipe-sub\">RAG+PII<\u002Fp>\n                <\u002Fdiv><\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Drop zone multi-CV -->\n          <div>\n            <label class=\"label\">// CVs <span class=\"text-slate-600 normal-case tracking-normal\">(PDF · DOCX · JPG · PNG)<\u002Fspan><\u002Flabel>\n            <div id=\"dz-cvs\" onclick=\"document.getElementById('file-cvs').click()\" class=\"drop-zone p-7 text-center cursor-pointer\">\n              <input type=\"file\" id=\"file-cvs\" multiple=\"\" accept=\".pdf,.docx,.txt,.png,.jpg,.jpeg,.webp\" onchange=\"onFilesCV(this)\">\n              <div class=\"mx-auto mb-3 w-12 h-12 rounded-xl flex items-center justify-center\" style=\"background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);box-shadow:0 0 22px rgba(34,211,238,.15) inset\">\n                <svg class=\"w-6 h-6 text-cyan-300\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                  <path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.6\" d=\"M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12\"><\u002Fpath>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <p class=\"text-sm text-slate-200 font-medium\">Arrastrá o hacé click para seleccionar<\u002Fp>\n              <p class=\"text-xs text-slate-500 mt-1 mono\">[ multi-upload · drag &amp; drop ]<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Lista de archivos seleccionados -->\n          <div id=\"cv-queue-wrap\" class=\"hidden\">\n            <div class=\"flex items-center justify-between mb-2\">\n              <span class=\"text-[10px] mono uppercase tracking-[.18em] text-cyan-400\" id=\"cv-queue-count\"><\u002Fspan>\n              <button onclick=\"clearQueue()\" class=\"text-[10px] mono uppercase tracking-wider text-slate-500 hover:text-red-400 transition-colors\">Limpiar<\u002Fbutton>\n            <\u002Fdiv>\n            <div id=\"cv-queue\" class=\"space-y-1.5 max-h-56 overflow-y-auto pr-1\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Botón evaluar -->\n          <button id=\"btn-eval\" onclick=\"evaluarBatch()\" class=\"w-full btn-primary\">\n            <span class=\"mono\">▶ Ejecutar análisis<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Columna derecha: resultados (3/5) -->\n      <div class=\"lg:col-span-3\">\n\n        <!-- Placeholder -->\n        <div id=\"ph-eval\" class=\"panel corner flex flex-col items-center justify-center text-center py-24 h-full\">\n          <div class=\"w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-5 relative\" style=\"background:rgba(34,211,238,.05);border:1px solid var(--line-2);\">\n            <svg class=\"w-9 h-9 text-cyan-400/60\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n              <path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.5\" d=\"M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z\"><\u002Fpath>\n            <\u002Fsvg>\n            <span class=\"absolute -top-2 -right-2 mono text-[9px] text-cyan-400/70 px-1.5 py-0.5 rounded border border-cyan-400/30\">STAND BY<\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"text-sm font-medium text-slate-300\">El ranking de candidatos aparecerá aquí<\u002Fp>\n          <p class=\"text-[11px] text-slate-500 mt-1 mono caret\">Esperando entrada de datos<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Loader -->\n        <div id=\"ld-eval\" class=\"hidden panel corner flex-col items-center justify-center py-24 gap-6\">\n          <div class=\"flex gap-2\">\n            <div class=\"dot w-3 h-3 bg-cyan-400 rounded-full\"><\u002Fdiv>\n            <div class=\"dot w-3 h-3 bg-cyan-400 rounded-full\"><\u002Fdiv>\n            <div class=\"dot w-3 h-3 bg-cyan-400 rounded-full\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"text-center\">\n            <p class=\"text-base font-medium text-white\" id=\"ld-title\">Procesando CVs…<\u002Fp>\n            <p class=\"text-[11px] text-slate-500 mt-2 mono uppercase tracking-wider\" id=\"ld-sub\">› extracción · embeddings · scoring<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"w-56 progress-track\">\n            <div class=\"progress-shimmer\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Resultados batch -->\n        <div id=\"res-batch\" class=\"hidden fade-in space-y-5\">\n\n          <!-- Resumen -->\n          <div class=\"panel p-5\">\n            <div class=\"flex items-center justify-between mb-4\">\n              <div>\n                <p class=\"text-[10px] mono uppercase tracking-[.2em] text-cyan-400\">›› Cargo<\u002Fp>\n                <p class=\"text-base font-bold text-white mt-0.5\" id=\"rb-cargo\"><\u002Fp>\n              <\u002Fdiv>\n              <span class=\"mono text-[10px] text-slate-400 border border-slate-700/50 px-2 py-1 rounded\" id=\"rb-config\"><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"grid grid-cols-3 gap-3\">\n              <div class=\"stat-tile apt\">\n                <p class=\"num text-emerald-400\" id=\"rb-aptos\">0<\u002Fp>\n                <p class=\"lbl text-emerald-400/80\">› APTOS<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"stat-tile no\">\n                <p class=\"num text-rose-400\" id=\"rb-no-aptos\">0<\u002Fp>\n                <p class=\"lbl text-rose-400/80\">› NO APTOS<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"stat-tile tot\">\n                <p class=\"num text-cyan-300\" id=\"rb-total\">0<\u002Fp>\n                <p class=\"lbl text-cyan-300/80\">› TOTAL<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Ranking -->\n          <div class=\"panel overflow-hidden\">\n            <div class=\"px-5 py-3.5 border-b border-slate-800/60 flex items-center justify-between\">\n              <p class=\"text-[10px] mono font-semibold text-cyan-400 uppercase tracking-[.22em]\">›› Ranking de candidatos<\u002Fp>\n              <button onclick=\"exportCSV()\" class=\"text-[10px] mono uppercase tracking-wider text-cyan-300 hover:text-white transition-colors flex items-center gap-1\">\n                [↓ EXPORT CSV]\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div id=\"ranking-list\" class=\"divide-y divide-slate-800/60\"><\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Detalle de un candidato (expandido) -->\n        <div id=\"detalle-panel\" class=\"hidden fade-in mt-5 panel p-6 space-y-5\">\n          <div class=\"flex items-center justify-between\">\n            <div>\n              <p class=\"text-[10px] mono uppercase tracking-[.2em] text-cyan-400\">›› Detalle de candidato<\u002Fp>\n              <p class=\"text-base font-bold text-white mt-0.5\" id=\"det-nombre\"><\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"cerrarDetalle()\" class=\"text-slate-500 hover:text-rose-400 text-2xl leading-none transition-colors\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div id=\"det-dims\" class=\"space-y-3\"><\u002Fdiv>\n          <div>\n            <p class=\"text-[10px] mono font-semibold text-cyan-400/80 uppercase tracking-[.2em] mb-2\">›› Justificación<\u002Fp>\n            <p id=\"det-just\" class=\"text-sm text-slate-300 leading-relaxed\"><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ TAB CARGOS ════════════════════════════════════════════════════════ -->\n  <div id=\"p-cargos\" class=\"hidden fade-in\">\n    <div class=\"grid lg:grid-cols-2 gap-7\">\n      <div class=\"panel corner p-5 space-y-5\">\n        <div>\n          <div class=\"section-title mb-1\">\n            <span class=\"mono text-[10px] text-cyan-400 tracking-[.25em]\">›› NEW<\u002Fspan>\n            <div class=\"line\"><\u002Fdiv>\n          <\u002Fdiv>\n          <h2 class=\"text-xl font-bold text-white\">Nuevo cargo<\u002Fh2>\n          <p class=\"text-xs text-slate-500 mt-1\">Subí el PDF o DOCX con la descripción del puesto.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\">// Nombre del cargo<\u002Flabel>\n          <input id=\"c-nombre\" type=\"text\" placeholder=\"Ej: Analista de Datos Senior\" class=\"field\">\n        <\u002Fdiv>\n        <div>\n          <label class=\"label\">// Descripción del cargo<\u002Flabel>\n          <div id=\"dz-jd\" onclick=\"document.getElementById('file-jd').click()\" class=\"drop-zone p-9 text-center cursor-pointer\">\n            <input type=\"file\" id=\"file-jd\" accept=\".pdf,.docx,.txt\" onchange=\"onFileJD(this)\">\n            <div class=\"mx-auto mb-3 w-12 h-12 rounded-xl flex items-center justify-center\" style=\"background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25)\">\n              <svg class=\"w-6 h-6 text-cyan-300\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                <path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.6\" d=\"M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <p class=\"text-sm text-slate-200 font-medium mono\">PDF · DOCX · TXT<\u002Fp>\n          <\u002Fdiv>\n          <div id=\"jd-preview\" class=\"hidden mt-2 flex items-center gap-2 panel-lite px-3 py-2\">\n            <span class=\"mono text-[10px] text-cyan-400\">[FILE]<\u002Fspan>\n            <span id=\"jd-filename\" class=\"text-sm text-cyan-100 truncate flex-1\"><\u002Fspan>\n            <button onclick=\"clearJD()\" class=\"text-slate-500 hover:text-rose-400\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button id=\"btn-cargo\" onclick=\"crearCargo()\" class=\"w-full btn-primary\">\n          <span class=\"mono\">＋ Crear cargo<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"panel corner p-5\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <div class=\"section-title flex-1\">\n            <span class=\"mono text-[10px] text-cyan-400 tracking-[.25em]\">›› ACTIVOS<\u002Fspan>\n            <div class=\"line\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span id=\"c-count\" class=\"mono text-[10px] text-slate-500 uppercase tracking-wider\"><\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"lista-cargos\" class=\"space-y-3\"><\u002Fdiv>\n        <div id=\"sin-cargos\" class=\"hidden text-center py-12 mono text-xs text-slate-500 uppercase tracking-wider\">// Sin cargos registrados<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ TAB HISTORIAL ════════════════════════════════════════════════════ -->\n  <div id=\"p-historial\" class=\"hidden fade-in\">\n    <div class=\"panel corner p-5\">\n      <div class=\"flex items-center justify-between mb-5\">\n        <div>\n          <div class=\"section-title mb-1\">\n            <span class=\"mono text-[10px] text-cyan-400 tracking-[.25em]\">›› LOG<\u002Fspan>\n            <div class=\"line w-32\"><\u002Fdiv>\n          <\u002Fdiv>\n          <h2 class=\"text-xl font-bold text-white\">Historial<\u002Fh2>\n          <p class=\"text-xs text-slate-500 mt-0.5 mono\" id=\"hist-count\"><\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"cargarHistorial()\" class=\"mono text-[10px] uppercase tracking-wider text-cyan-300 hover:text-white border border-cyan-400/30 hover:border-cyan-400 px-3 py-2 rounded-lg transition-all\">↻ Actualizar<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"t-hist\" class=\"space-y-2\"><\u002Fdiv>\n      <div id=\"sin-hist\" class=\"hidden text-center py-14 mono text-xs text-slate-500 uppercase tracking-wider\">// Sin evaluaciones registradas<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fmain>\n\n<div id=\"toast\" class=\"hidden fixed bottom-5 right-5 px-4 py-3 rounded-xl text-sm font-medium z-50 max-w-xs mono\"><\u002Fdiv>\n\n<script>\nconst API = '';\nlet cargos = {};\nlet cvFiles = [];\nlet jdFile  = null;\nlet lastBatchData = null;\n\n// Clock\nfunction tickClock(){\n  const d = new Date();\n  const z = n => String(n).padStart(2,'0');\n  const el = document.getElementById('hclock');\n  if(el) el.textContent = `${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;\n}\nsetInterval(tickClock, 1000); tickClock();\n\n// ── Init ──────────────────────────────────────────────────────────────────\ndocument.addEventListener('DOMContentLoaded', () => {\n  checkHealth();\n  cargarCargos();\n  setInterval(checkHealth, 30000);\n  setupDragDrop('dz-cvs', addFiles);\n  setupDragDrop('dz-jd',  f => { jdFile = f; showJDPreview(f); });\n});\n\n// ── Tabs ──────────────────────────────────────────────────────────────────\nfunction tab(t) {\n  ['evaluar','cargos','historial'].forEach(x => {\n    document.getElementById(`p-${x}`).classList.add('hidden');\n    document.getElementById(`tb-${x}`).classList.remove('active-tab');\n  });\n  document.getElementById(`p-${t}`).classList.remove('hidden');\n  document.getElementById(`tb-${t}`).classList.add('active-tab');\n  if (t === 'historial') cargarHistorial();\n  if (t === 'cargos')    renderCargos();\n}\n\n// ── Health ────────────────────────────────────────────────────────────────\nasync function checkHealth() {\n  const b = document.getElementById('hbadge');\n  try {\n    const d = await fetch(`${API}/health`).then(r => r.json());\n    b.className = 'status-pill online';\n    b.innerHTML = `<span class=\"led\"><\u002Fspan><span>ONLINE · ${d.cargos} CARGO${d.cargos!==1?'S':''}<\u002Fspan>`;\n  } catch {\n    b.className = 'status-pill offline';\n    b.innerHTML = `<span class=\"led\"><\u002Fspan><span>SIN CONEXIÓN<\u002Fspan>`;\n  }\n}\n\n// ── Drag & drop ───────────────────────────────────────────────────────────\nfunction setupDragDrop(dzId, onFile) {\n  const dz = document.getElementById(dzId);\n  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });\n  dz.addEventListener('dragleave', () => dz.classList.remove('over'));\n  dz.addEventListener('drop', e => {\n    e.preventDefault(); dz.classList.remove('over');\n    const files = [...e.dataTransfer.files];\n    if (dzId === 'dz-cvs') { addFiles(files); }\n    else if (files[0]) { onFile(files[0]); }\n  });\n}\n\n// ── Multi-CV queue ────────────────────────────────────────────────────────\nfunction onFilesCV(input) { addFiles([...input.files]); input.value = ''; }\n\nfunction addFiles(files) {\n  const allowed = ['.pdf','.docx','.txt','.png','.jpg','.jpeg','.webp'];\n  files.forEach(f => {\n    const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();\n    if (!allowed.includes(ext)) { toast(`Formato no soportado: ${f.name}`, 'err'); return; }\n    if (cvFiles.find(x => x.name === f.name && x.size === f.size)) return;\n    cvFiles.push(f);\n  });\n  renderQueue();\n}\nfunction removeFile(idx) { cvFiles.splice(idx, 1); renderQueue(); }\nfunction clearQueue() { cvFiles = []; renderQueue(); }\n\nfunction renderQueue() {\n  const wrap = document.getElementById('cv-queue-wrap');\n  const list = document.getElementById('cv-queue');\n  const count = document.getElementById('cv-queue-count');\n  if (!cvFiles.length) { wrap.classList.add('hidden'); return; }\n  wrap.classList.remove('hidden');\n  count.textContent = `›› ${cvFiles.length} ARCHIVO${cvFiles.length!==1?'S':''} EN COLA`;\n\n  const extColors = {\n    PDF:  ['#fb7185','rgba(251,113,133,.12)'],\n    DOCX: ['#22d3ee','rgba(34,211,238,.12)'],\n    PNG:  ['#a78bfa','rgba(167,139,250,.12)'],\n    JPG:  ['#fbbf24','rgba(251,191,36,.12)'],\n    JPEG: ['#fbbf24','rgba(251,191,36,.12)'],\n    TXT:  ['#34d399','rgba(52,211,153,.12)'],\n    WEBP: ['#a78bfa','rgba(167,139,250,.12)'],\n  };\n\n  list.innerHTML = cvFiles.map((f, i) => {\n    const ext = f.name.slice(f.name.lastIndexOf('.')+1).toUpperCase();\n    const [fg, bg] = extColors[ext] || ['#94a3b8','rgba(148,163,184,.12)'];\n    return `\n      <div class=\"cv-item-enter cv-item flex items-center gap-2.5\">\n        <span class=\"mono text-[10px] font-bold px-1.5 py-0.5 rounded\" style=\"color:${fg};background:${bg};border:1px solid ${fg}40\">${ext}<\u002Fspan>\n        <span class=\"text-xs text-slate-200 truncate flex-1\">${f.name}<\u002Fspan>\n        <span class=\"mono text-[10px] text-slate-500 shrink-0\">${(f.size/1024).toFixed(0)}KB<\u002Fspan>\n        <button onclick=\"removeFile(${i})\" class=\"text-slate-500 hover:text-rose-400 shrink-0 text-base leading-none\">×<\u002Fbutton>\n      <\u002Fdiv>`;\n  }).join('');\n}\n\n// ── Evaluación batch ──────────────────────────────────────────────────────\nasync function evaluarBatch() {\n  const cargoId = document.getElementById('sel-cargo').value;\n  const config  = document.querySelector('input[name=\"cfg\"]:checked')?.value || 'c2';\n\n  if (!cargoId)        { toast('Seleccioná un cargo.', 'err'); return; }\n  if (!cvFiles.length) { toast('Agregá al menos un CV.', 'err'); return; }\n\n  document.getElementById('ph-eval').classList.add('hidden');\n  document.getElementById('res-batch').classList.add('hidden');\n  document.getElementById('detalle-panel').classList.add('hidden');\n  const ld = document.getElementById('ld-eval');\n  ld.classList.remove('hidden');\n  ld.classList.add('flex'); // ensure flex layout when shown\n  document.getElementById('ld-title').textContent = `Procesando ${cvFiles.length} CV${cvFiles.length!==1?'s':''}…`;\n  document.getElementById('btn-eval').disabled = true;\n\n  try {\n    const fd = new FormData();\n    fd.append('cargo_id', cargoId);\n    fd.append('config', config);\n    cvFiles.forEach(f => fd.append('archivos_cv', f));\n\n    const r = await fetch(`${API}/api/evaluar/batch`, { method:'POST', body:fd });\n    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);\n    const d = await r.json();\n    lastBatchData = d;\n    renderBatch(d);\n  } catch(e) {\n    toast(`Error: ${e.message}`, 'err');\n    document.getElementById('ph-eval').classList.remove('hidden');\n  } finally {\n    ld.classList.add('hidden');\n    ld.classList.remove('flex');\n    document.getElementById('btn-eval').disabled = false;\n  }\n}\n\nfunction renderBatch(d) {\n  document.getElementById('rb-cargo').textContent  = d.cargo_nombre;\n  document.getElementById('rb-config').textContent = `CFG · ${(d.resultados[0]?.config||'').toUpperCase()}`;\n  document.getElementById('rb-aptos').textContent    = d.aptos;\n  document.getElementById('rb-no-aptos').textContent = d.no_aptos;\n  document.getElementById('rb-total').textContent    = d.total;\n\n  const list = document.getElementById('ranking-list');\n  list.innerHTML = d.resultados.map((r, i) => {\n    const apto  = r.decision === 'APTO';\n    const error = r.decision === 'ERROR';\n    const score = r.score ?? '—';\n    const bgScore = apto ? 'rgba(52,211,153,.10)' : error ? 'rgba(120,180,255,.05)' : 'rgba(251,113,133,.10)';\n    const fgScore = apto ? '#34d399' : error ? '#64748b' : '#fb7185';\n    const brdScore = apto ? 'rgba(52,211,153,.4)' : error ? 'rgba(120,180,255,.2)' : 'rgba(251,113,133,.4)';\n    const rank  = error ? '—' : `#${String(i+1).padStart(2,'0')}`;\n\n    return `\n      <div class=\"rank-row flex items-center gap-3 px-5 py-3.5 cursor-pointer\"\n        onclick=\"${error ? '' : `abrirDetalle(${i})`}\">\n        <span class=\"mono text-[11px] text-cyan-400/60 w-8 shrink-0 text-right\">${rank}<\u002Fspan>\n        <div class=\"score-pill\" style=\"background:${bgScore};color:${fgScore};border:1px solid ${brdScore}\">${score}<\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <p class=\"text-sm font-semibold text-white truncate\">${r.candidato_nombre || r.archivo_cv}<\u002Fp>\n          <p class=\"mono text-[10px] text-slate-500 truncate\">${r.archivo_cv}<\u002Fp>\n          ${r.error ? `<p class=\"text-xs text-rose-400/80 mono\">${r.error}<\u002Fp>` : ''}\n        <\u002Fdiv>\n        <div class=\"text-right shrink-0\">\n          <span class=\"badge ${apto ? 'apt' : error ? 'err' : 'no'}\">\n            ${apto ? 'APTO' : error ? 'ERROR' : 'NO APTO'}\n          <\u002Fspan>\n          ${r.tiempo_segundos ? `<p class=\"mono text-[10px] text-slate-500 mt-1\">${r.tiempo_segundos}s<\u002Fp>` : ''}\n        <\u002Fdiv>\n        ${!error ? '<span class=\"text-cyan-400/50 shrink-0\">›<\u002Fspan>' : ''}\n      <\u002Fdiv>`;\n  }).join('');\n\n  document.getElementById('res-batch').classList.remove('hidden');\n}\n\nfunction abrirDetalle(idx) {\n  const r = lastBatchData.resultados[idx];\n  document.getElementById('det-nombre').textContent = r.candidato_nombre || r.archivo_cv;\n\n  const dimCfg = [\n    { k:'competencias_tecnicas', label:'Competencias técnicas', pct:'40%' },\n    { k:'experiencia',           label:'Experiencia relevante', pct:'30%' },\n    { k:'formacion',             label:'Formación académica',   pct:'20%' },\n    { k:'soft_skills',           label:'Soft skills',           pct:'10%' },\n  ];\n  const dims = r.dimensiones || {};\n  document.getElementById('det-dims').innerHTML = dimCfg.map(({ k, label, pct }) => {\n    const v  = dims[k] ?? 0;\n    const color = v >= 70 ? '#34d399' : v >= 50 ? '#fbbf24' : '#fb7185';\n    return `<div>\n      <div class=\"flex justify-between text-xs mb-1.5\">\n        <span class=\"text-slate-200 font-medium\">${label}<\u002Fspan>\n        <span class=\"mono text-[10px] text-slate-500\">${pct} · <strong style=\"color:${color}\">${v}/100<\u002Fstrong><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"w-full rounded-full h-2 overflow-hidden\" style=\"background:rgba(120,180,255,.08); border:1px solid var(--line)\">\n        <div class=\"bar h-full rounded-full\" style=\"width:${v}%;background:linear-gradient(90deg, ${color}aa, ${color}); box-shadow:0 0 12px ${color}80\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  document.getElementById('det-just').textContent = r.justificacion || '—';\n  document.getElementById('detalle-panel').classList.remove('hidden');\n}\n\nfunction cerrarDetalle() {\n  document.getElementById('detalle-panel').classList.add('hidden');\n}\n\nfunction exportCSV() {\n  if (!lastBatchData) return;\n  const rows = [['Ranking','Candidato','Archivo','Score','Decision','Tecnico','Experiencia','Formacion','SoftSkills','Tiempo_s','Config']];\n  lastBatchData.resultados.forEach((r, i) => {\n    const d = r.dimensiones || {};\n    rows.push([i+1, r.candidato_nombre, r.archivo_cv, r.score, r.decision,\n      d.competencias_tecnicas, d.experiencia, d.formacion, d.soft_skills,\n      r.tiempo_segundos, r.config]);\n  });\n  const csv = rows.map(r => r.join(',')).join('\\n');\n  const a = document.createElement('a');\n  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));\n  a.download = `sistac_resultados_${lastBatchData.cargo_nombre.replace(/\\s+/g,'_')}.csv`;\n  a.click();\n}\n\n// ── Cargos ────────────────────────────────────────────────────────────────\nasync function cargarCargos() {\n  try {\n    const d = await fetch(`${API}/api/cargos`).then(r => r.json());\n    cargos = {};\n    d.cargos.forEach(c => cargos[c.id] = c);\n    const sel = document.getElementById('sel-cargo');\n    const ids = Object.keys(cargos);\n    sel.innerHTML = ids.length\n      ? ids.map(id => `<option value=\"${id}\">${cargos[id].nombre}<\u002Foption>`).join('')\n      : '<option value=\"\">— Creá un cargo primero —<\u002Foption>';\n    renderCargos();\n    checkHealth();\n  } catch {}\n}\n\nfunction renderCargos() {\n  const cont = document.getElementById('lista-cargos');\n  const ids  = Object.keys(cargos);\n  document.getElementById('c-count').textContent = `${ids.length} CARGO${ids.length!==1?'S':''}`;\n  if (!ids.length) { cont.innerHTML = ''; document.getElementById('sin-cargos').classList.remove('hidden'); return; }\n  document.getElementById('sin-cargos').classList.add('hidden');\n  cont.innerHTML = ids.map(id => {\n    const c = cargos[id];\n    return `<div class=\"panel-lite p-4 flex items-start justify-between gap-3 hover:border-cyan-400/40 transition-colors\">\n      <div class=\"min-w-0\">\n        <div class=\"flex items-center gap-2 flex-wrap\">\n          <span class=\"text-sm font-semibold text-white\">${c.nombre}<\u002Fspan>\n          <span class=\"mono text-[10px] text-cyan-400/60\">${c.id}<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"mono text-[10px] text-slate-500 mt-1 truncate\">› ${c.archivo||'sin archivo'}<\u002Fp>\n        <div class=\"flex gap-3 mt-1.5 mono text-[10px] text-slate-500 uppercase tracking-wider\">\n          <span>${c.candidatos} candidato${c.candidatos!==1?'s':''}<\u002Fspan>\n          <span>·<\u002Fspan>\n          <span>${new Date(c.fecha).toLocaleDateString('es-UY')}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"eliminarCargo('${id}')\" class=\"text-slate-500 hover:text-rose-400 transition-colors text-xl leading-none shrink-0\">×<\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction showJDPreview(f) {\n  document.getElementById('jd-preview').classList.remove('hidden');\n  document.getElementById('jd-preview').classList.add('flex');\n  document.getElementById('jd-filename').textContent = `${f.name}  (${(f.size/1024).toFixed(0)} KB)`;\n  document.getElementById('dz-jd').style.display = 'none';\n}\nfunction clearJD() {\n  jdFile = null;\n  document.getElementById('jd-preview').classList.add('hidden');\n  document.getElementById('jd-preview').classList.remove('flex');\n  document.getElementById('dz-jd').style.display = '';\n  document.getElementById('file-jd').value = '';\n}\nfunction onFileJD(input) { if (input.files[0]) { jdFile = input.files[0]; showJDPreview(jdFile); } }\n\nasync function crearCargo() {\n  const nombre = document.getElementById('c-nombre').value.trim();\n  if (!nombre) { toast('Escribí el nombre del cargo.', 'err'); return; }\n  if (!jdFile)  { toast('Subí el documento del cargo.', 'err'); return; }\n  const btn = document.getElementById('btn-cargo');\n  btn.disabled = true; btn.innerHTML = '<span class=\"mono\">Procesando…<\u002Fspan>';\n  try {\n    const fd = new FormData();\n    fd.append('nombre', nombre);\n    fd.append('archivo', jdFile);\n    fd.append('config', 'c2');\n    const r = await fetch(`${API}/api/cargo`, { method:'POST', body:fd });\n    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);\n    const d = await r.json();\n    toast(`Cargo \"${nombre}\" creado (${d.chars} caracteres extraídos).`, 'ok');\n    document.getElementById('c-nombre').value = '';\n    clearJD();\n    await cargarCargos();\n    tab('evaluar');\n  } catch(e) { toast(`Error: ${e.message}`, 'err'); }\n  finally { btn.disabled = false; btn.innerHTML = '<span class=\"mono\">＋ Crear cargo<\u002Fspan>'; }\n}\n\nasync function eliminarCargo(id) {\n  if (!confirm(`¿Eliminar \"${cargos[id]?.nombre}\"?`)) return;\n  await fetch(`${API}/api/cargo/${id}`, { method:'DELETE' });\n  await cargarCargos();\n  toast('Cargo eliminado.', 'info');\n}\n\n// ── Historial ─────────────────────────────────────────────────────────────\nasync function cargarHistorial() {\n  try {\n    const d = await fetch(`${API}/api/resultados`).then(r => r.json());\n    document.getElementById('hist-count').textContent = `// ${d.total} evaluación${d.total!==1?'es':''} registrada${d.total!==1?'s':''}`;\n    const cont = document.getElementById('t-hist');\n    if (!d.resultados.length) { cont.innerHTML=''; document.getElementById('sin-hist').classList.remove('hidden'); return; }\n    document.getElementById('sin-hist').classList.add('hidden');\n    cont.innerHTML = d.resultados.map(r => {\n      const apto = r.decision === 'APTO';\n      const bgScore = apto ? 'rgba(52,211,153,.10)' : 'rgba(251,113,133,.10)';\n      const fgScore = apto ? '#34d399' : '#fb7185';\n      const brdScore = apto ? 'rgba(52,211,153,.4)' : 'rgba(251,113,133,.4)';\n      return `<div class=\"panel-lite p-4 flex items-center gap-3\">\n        <div class=\"score-pill\" style=\"background:${bgScore};color:${fgScore};border:1px solid ${brdScore}\">${r.score??'—'}<\u002Fdiv>\n        <div class=\"flex-1 min-w-0\">\n          <div class=\"flex items-center gap-2 flex-wrap\">\n            <span class=\"font-semibold text-white text-sm\">${r.candidato_nombre}<\u002Fspan>\n            <span class=\"badge ${apto?'apt':'no'}\">${apto?'APTO':'NO APTO'}<\u002Fspan>\n            <span class=\"mono text-[10px] text-cyan-400/70\">${r.config?.toUpperCase()}<\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"text-xs text-slate-400 truncate\">${r.cargo_nombre} <span class=\"text-slate-600\">·<\u002Fspan> <span class=\"mono text-slate-500\">${r.archivo_cv||''}<\u002Fspan><\u002Fp>\n          <p class=\"mono text-[10px] text-slate-500 mt-0.5\">${new Date(r.fecha).toLocaleString('es-UY')}<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"mono text-[10px] text-slate-500 shrink-0\">${r.tiempo_segundos}s<\u002Fspan>\n      <\u002Fdiv>`;\n    }).join('');\n  } catch {}\n}\n\n// ── Toast ──────────────────────────────────────────────────────────────────\nfunction toast(msg, type='info') {\n  const el = document.getElementById('toast');\n  const cls = {\n    ok:'bg-emerald-500/15 text-emerald-300 border border-emerald-400/40',\n    err:'bg-rose-500/15 text-rose-300 border border-rose-400/40',\n    info:'bg-slate-800/80 text-slate-200 border border-slate-700'\n  };\n  el.className = `fixed bottom-5 right-5 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium z-50 max-w-xs mono backdrop-blur-md ${cls[type]||cls.info}`;\n  el.style.boxShadow = '0 0 30px rgba(34,211,238,.12)';\n  el.textContent = msg;\n  el.classList.remove('hidden');\n  setTimeout(() => el.classList.add('hidden'), 4000);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
